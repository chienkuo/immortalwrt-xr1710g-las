name: Build XR1710G Firmware

on:
  workflow_dispatch:
    inputs:
      device:
        description: '目标设备'
        required: true
        default: 'gemtek_xr1710g-ubi'
        type: choice
        options:
          - gemtek_xr1710g-ubi
          - gemtek_w1700k-ubi
          - gemtek_xg2010g-ubi
      threads:
        description: '编译线程数 (留空则自动)'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 0 */14 * *'

env:
  DEVICE: gemtek_xr1710g-ubi

jobs:
  build-xr1710g:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.device == 'gemtek_xr1710g-ubi' || inputs.device == ''))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup build environment
        run: |
          sudo apt update
          sudo apt install -y build-essential clang gcc g++ binutils bzip2 gawk gettext \
            git libncurses-dev libssl-dev python3 python3-setuptools rsync unzip \
            wget xsltproc zlib1g-dev file which perl sed make

      - name: Install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          # 使用 .config 或创建默认
          if [ ! -f .config ]; then
            make defconfig
          fi
          # 确保设备配置正确
          if ! grep -q "DEVICE_gemtek_xr1710g-ubi=y" .config; then
            echo "CONFIG_TARGET_airoha_an7581_DEVICE_gemtek_xr1710g-ubi=y" >> .config
          fi
          make defconfig

      - name: Download sources
        run: make download -j$(nproc)

      - name: Build XR1710G
        run: |
          THREADS="${THREADS:-$(nproc)}"
          echo "Using $THREADS threads"
          make -j$THREADS V=s  2>&1 | tee build.log

      - name: Show artifacts
        run: |
          echo "=== XR1710G Firmware ==="
          ls -lh bin/targets/airoha/an7581/*xr1710g* 2>/dev/null || echo "No XR1710G artifacts"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xr1710g-firmware
          path: |
            bin/targets/airoha/an7581/*xr1710g*
            bin/targets/airoha/an7581/sha256sums
          retention-days: 30
